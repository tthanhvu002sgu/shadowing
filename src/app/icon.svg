<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Retro light background -->
  <rect width="256" height="256" fill="#f4f4f0"/>
  
  <!-- Outer thick black border -->
  <rect x="16" y="16" width="224" height="224" fill="none" stroke="#000000" stroke-width="16" />
  
  <!-- Inner black box -->
  <rect x="48" y="48" width="160" height="160" fill="#000000" />
  
  <!-- Pixelated/Mono 'S' for Shadowing -->
  <text x="128" y="172" font-family="'Courier New', monospace" font-size="130" font-weight="bold" fill="#f4f4f0" text-anchor="middle">S</text>
</svg>
